# @package _global_

module:
  _target_: emg2qwerty.lightning.GRUCTCModule
  in_features: 528
  mlp_features:
  - 384
  hidden_size: 288
  num_layers: 2
  dropout: 0.25
  bidirectional: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding:
  - 1800
  - 200

optimizer:
  _target_: torch.optim.AdamW
  lr: 0.001
  weight_decay: 1e-5

specaug:
  _target_: emg2qwerty.transforms.SpecAugment
  n_time_masks: 1        
  time_mask_param: 10    
  n_freq_masks: 1        
  freq_mask_param: 2