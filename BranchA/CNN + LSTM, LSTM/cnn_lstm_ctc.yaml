# @package _global_
# CNN + LSTM hybrid: TDS conv encoder then BiLSTM, then CTC
module:
  _target_: emg2qwerty.lightning.CNNLSTMCTCModule
  in_features: 528  # freq * channels = (n_fft // 2 + 1) * 16
  mlp_features: [384]
  block_channels: [24, 24, 24, 24]
  kernel_width: 32
  lstm_hidden_size: 256
  lstm_num_layers: 2
  dropout: 0.2

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]
