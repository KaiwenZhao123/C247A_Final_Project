# @package _global_
module:
  _target_: emg2qwerty.lightning.EarlyFusionTDSConvCTCModule
  in_features: 528
  mlp_features: [384, 256]
  block_channels: [16, 16, 16, 16]
  kernel_width: 32
  optimizer: ${optimizer}
  lr_scheduler: ${lr_scheduler}
  decoder: ${decoder}

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]